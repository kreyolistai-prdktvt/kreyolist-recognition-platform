<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KreyoList — Luxury Product Discovery & Lifestyle Curation</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Explore KreyoList: A high-end, curated discovery platform featuring 15 premium venues optimized for corporate appreciation, executive rewards, and elite team entertainment.">
  <meta name="keywords" content="luxury venues, team entertainment, corporate appreciation, employee rewards, wellness retreats, sensory dining, VIP lifestyle">
  <meta name="author" content="KreyoList Global">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="KreyoList — Curated Premium Lifestyle & Venues">
  <meta property="og:description" content="Discover premium experiences for employee appreciation, team entertainment, and wellness restoration.">
  <meta property="og:image" content="./assets/employee_appreciation_bg.jpg">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="KreyoList — Curated Premium Lifestyle & Venues">
  <meta property="twitter:description" content="Discover premium experiences for employee appreciation, team entertainment, and wellness restoration.">
  <meta property="twitter:image" content="./assets/employee_appreciation_bg.jpg">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./css/styles.css?v=1.0.2">
  
  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
</head>
<body>
  
  <div class="app-container">
    <!-- Compact Editorial Header -->
    <header class="app-header-compact">
      <h1 class="brand-title-compact">Kreyō <span>List</span></h1>
      <div class="user-profile-button" aria-label="User Profile" role="button" tabindex="0">
        <svg class="profile-avatar-icon" viewBox="0 0 24 24">
          <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
    </header>

    <!-- Micro-Personalization Greeting Layer -->
    <div class="recognition-portal-greeting">
      SELECT YOUR CURATED EXPERIENCE.
    </div>

    <!-- Interactive Filter & Sort Mount -->
    <section aria-label="Directory Filters" id="filter-bar-mount"></section>

    <!-- Venue Directory Cards Grid Mount -->
    <main class="venue-grid" id="venue-grid-mount" aria-live="polite"></main>
    
    <!-- Detail Modal Mounting Node -->
    <div id="modal-mount"></div>

    <!-- Editorial Footer -->
    <footer class="app-footer">
      <div class="footer-copy">&copy; 2026 Kreyō List. All rights reserved.</div>
      <div class="footer-credit">Where alignment meets sanctuary.</div>
    </footer>
  </div>

  <!-- Main Orchestration Script (ES Module) -->
  <script type="module" src="./js/app.js?v=1.0.2"></script>
</body>
</html>
